<!DOCTYPE html>
<html lang="ja">
<head>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>AnimHabit 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #FFF8F0;
    --card: rgba(255, 255, 255, 0.85); 
    --accent1: #FF8B6B;
    --accent2: #FFD166;
    --accent3: #06D6A0;
    --accent4: #118AB2;
    --purple: #C77DFF;
    --text: #3D3D3D;
    --text-soft: #666;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    background-image: url('background.jpg'); 
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-color: var(--bg);
  }

  /* お祝いポップアップ */
  .congrats-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
    z-index: 2000; display: none; padding: 20px;
  }
  .congrats-card {
    background: white; border-radius: 30px; padding: 40px 20px; width: 100%; max-width: 320px;
    text-align: center; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .congrats-close {
    position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
    background: #EEE; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; font-weight: bold; color: #888;
  }
  .congrats-text { font-size: 20px; font-weight: 800; line-height: 1.6; color: var(--text); white-space: pre-wrap; }

  .header {
    background: linear-gradient(135deg, rgba(255,139,107,0.9) 0%, rgba(255,209,102,0.9) 100%);
    padding: 24px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(5px);
  }

  .pet-section { display: flex; flex-direction: column; align-items: center; padding: 28px 20px 12px; }

  .pet-bubble {
    width: 130px; height: 130px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    position: relative;
    animation: petFloat 3s ease-in-out infinite;
    cursor: pointer; transition: transform 0.1s; user-select: none;
  }
  .pet-bubble:active { transform: scale(0.92); }

  @keyframes petFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

  .pet-name { font-size: 20px; font-weight: 800; margin-top: 14px; text-shadow: 0 2px 4px rgba(255,255,255,0.8); }
  .pet-mood { font-size: 13px; color: var(--text-soft); font-weight: 600; background: rgba(255,255,255,0.6); padding: 2px 10px; border-radius: 10px; }

  .xp-bar-wrap { width: 100%; max-width: 320px; margin-top: 16px; background: rgba(255,255,255,0.5); border-radius: 99px; height: 14px; overflow: hidden; }
  .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #FF8B6B, #FFD166); width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .xp-label { font-size: 12px; color: var(--text-soft); margin-top: 6px; font-weight: 700; }

  .section-title { font-size: 16px; font-weight: 800; color: var(--text); padding: 20px 20px 10px; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }

  .habit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }

  .habit-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    padding: 18px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    box-shadow: var(--shadow);
    cursor: pointer; transition: transform 0.18s; border: 2.5px solid transparent; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .habit-card:active { transform: scale(0.94); }
  .habit-card.done { border-color: currentColor; background: rgba(255,255,255,0.95); }

  .habit-emoji { font-size: 40px; }
  .habit-label { font-size: 13px; font-weight: 800; text-align: center; }
  .habit-streak { font-size: 11px; color: var(--text-soft); font-weight: 700; }

  .check-ring { width: 24px; height: 24px; border-radius: 50%; border: 2.5px solid #DDD; display: flex; align-items: center; justify-content: center; }

  /* 色指定 */
  .habit-card[data-color="orange"] { color: #FF8B6B; }
  .habit-card[data-color="blue"]    { color: #118AB2; }
  .habit-card[data-color="green"]   { color: #06D6A0; }
  .habit-card[data-color="purple"] { color: #C77DFF; }
  .habit-card[data-color="yellow"] { color: #F4A800; }
  .habit-card[data-color="pink"]    { color: #FF6B9D; }

  .week-strip { display: flex; gap: 6px; padding: 16px 20px 0; justify-content: center; }
  .day-dot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .day-label { font-size: 10px; font-weight: 700; color: #666; }
  .day-circle { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #AAA; }
  .day-circle.done { background: linear-gradient(135deg, #FF8B6B, #FFD166); color: white; }

  .stats-row { display: flex; gap: 12px; padding: 16px 20px 0; }
  .stat-card { flex: 1; background: var(--card); backdrop-filter: blur(10px); border-radius: 16px; padding: 14px 12px; text-align: center; box-shadow: var(--shadow); }
  .stat-value { font-size: 24px; font-weight: 900; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 12px 0 20px; display: flex; justify-content: space-around; border-radius: 24px 24px 0 0; z-index: 100; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; background: none; border: none; }
  .nav-label { font-size: 10px; font-weight: 700; color: #999; }
  .nav-btn.active .nav-label { color: #FF8B6B; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #3D3D3D; color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .heart-float { position: fixed; font-size: 20px; pointer-events: none; animation: floatUp 1.2s ease-out forwards; z-index: 999; }
  @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

  input[type="text"] { -webkit-appearance: none; user-select: text !important; }
</style>
</head>
<body>

<div id="congratsOverlay" class="congrats-overlay">
  <div class="congrats-card">
    <div class="congrats-close" onclick="closeCongrats()">×</div>
    <div style="font-size: 50px; margin-bottom: 15px;">🌸</div>
    <div id="congratsMessage" class="congrats-text"></div>
  </div>
</div>

<div class="header">
  <div class="header-title">🐾 AnimHabit</div>
  <div class="header-date" id="dateLabel"></div>
</div>

<div id="page-home">
  <div class="pet-section">
    <div class="pet-bubble" id="petBubble" onclick="tapPet()">
      <span id="petEmoji">🐱</span>
    </div>
    <div class="pet-name" id="petName">みるく</div>
    <div class="pet-mood" id="petMood">...</div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar"></div></div>
    <div class="xp-label">Lv.<span id="levelNum">1</span> · <span id="xpText">0 / 6 XP</span></div>
  </div>

  <div class="week-strip" id="weekStrip"></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="statDone">0</div><div style="font-size:10px;">きょう</div></div>
    <div class="stat-card"><div class="stat-value" id="statStreak">🔥 0</div><div style="font-size:10px;">れんぞく</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div style="font-size:10px;">ぜんぶ</div></div>
  </div>

  <div class="section-title">きょうのしゅうかん</div>
  <div class="habit-grid" id="habitGrid"></div>
</div>

<div id="page-record" style="display:none; padding:20px;">
  <div class="section-title" style="padding-left:0;">📊 こんげつのハート</div>
  <div id="recordList"></div>
</div>

<div id="page-pet" style="display:none; padding:20px;">
  <div class="section-title" style="padding-left:0;">🐾 ペットをえらぶ</div>
  <div id="petSelect" style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; background:var(--card); padding:15px; border-radius:20px;"></div>
  <div class="section-title" style="padding:24px 0 8px;">なまえをつける</div>
  <input id="petNameInput" type="text" style="width:100%;padding:15px;border-radius:15px;border:2px solid #EEE;outline:none;background:var(--card);">
  <button onclick="savePetName()" style="width:100%;margin-top:12px;padding:15px;background:linear-gradient(135deg,#FF8B6B,#FFD166);color:white;border:none;border-radius:15px;font-weight:800;">保存する</button>
</div>

<div id="page-settings" style="display:none; padding:20px;">
  <div class="section-title" style="padding-left:0;">⚙️ せってい</div>
  <div style="background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow); margin-bottom: 20px;">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <input id="newHabitEmoji" type="text" placeholder="✨" onfocus="this.select();" inputmode="text"
        style="width:70px; height:54px; border-radius:15px; border:2px solid #EEE; text-align:center; font-size:28px; background:#FFF;">
      <input id="newHabitLabel" type="text" placeholder="習慣の名前を入力" 
        style="flex:1; height:54px; padding:0 15px; border-radius:15px; border:2px solid #EEE; outline:none; font-size:16px; background:#FFF;">
    </div>
    <button onclick="addHabit()" style="width:100%; height:50px; background:#06D6A0; color:white; border:none; border-radius:15px; font-weight:800;">＋ リストに追加</button>
    <div id="habitEditList" style="margin-top:20px; border-top:1px solid #EEE; padding-top:10px;"></div>
  </div>
  
  <div style="background:var(--card); border-radius:20px; overflow:hidden; box-shadow:var(--shadow);">
    <div onclick="resetToday()" style="padding:18px; border-bottom:1px solid #EEE;">🔄 今日の記録をリセット</div>
    <div onclick="resetAll()" style="padding:18px; color:#FF6B6B; border-bottom:1px solid #EEE;">🗑️ 全データをリセット</div>
    <div onclick="exportData()" style="padding:18px;">📤 データのバックアップ</div>
  </div>
  <div id="backupArea" style="display:none; margin-top:15px;"><textarea id="backupText" style="width:100%; height:80px; border-radius:10px; padding:10px; font-size:10px;"></textarea></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('home', this)"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></button>
  <button class="nav-btn" onclick="switchTab('record', this)"><span class="nav-icon">📊</span><span class="nav-label">きろく</span></button>
  <button class="nav-btn" onclick="switchTab('pet', this)"><span class="nav-icon">🐾</span><span class="nav-label">ペット</span></button>
  <button class="nav-btn" onclick="switchTab('settings', this)"><span class="nav-icon">⚙️</span><span class="nav-label">せってい</span></button>
</div>

<div class="toast" id="toast"></div>

<script>
  const se_sound = new Audio('sharan.mp3'); 
  const congrats_sound = new Audio('fanfare.mp3'); 

  const DEFAULT_HABITS = [
    { id: 'walk', emoji: '👟', label: '散歩', color: 'orange' },
    { id: 'praise', emoji: '🥰', label: '自分を褒める', color: 'pink' }
  ];

  const PETS_ALL = ['🐱','🐶','🐰','🐨','🐼','🦊','🐸','🐹','🐧','🦁','🐯','🐮'];
  const todayKey = () => new Date().toISOString().slice(0, 10);
  let state = JSON.parse(localStorage.getItem('animhabit_v2') || '{}');
  const today = todayKey();

  if (!state.done) state.done = {};
  if (!state.done[today]) state.done[today] = [];
  if (!state.counts) state.counts = {};
  if (!state.totalXP) state.totalXP = 0;
  if (!state.petIndex) state.petIndex = 0;
  if (!state.userHabits) state.userHabits = DEFAULT_HABITS;

  function save() { localStorage.setItem('animhabit_v2', JSON.stringify(state)); }

  const days = ['日','月','火','水','木','金','土'];
  const now = new Date();
  document.getElementById('dateLabel').textContent = `${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;

  function updateStats() {
    document.getElementById('statDone').textContent = state.done[today].length;
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = d.toISOString().slice(0, 10);
      if (state.done[k]?.length > 0) streak++; else if (i > 0) break;
    }
    document.getElementById('statStreak').textContent = `🔥 ${streak}`;
    let total = 0;
    for (let k in state.counts) for (let h in state.counts[k]) total += state.counts[k][h];
    document.getElementById('statTotal').textContent = total;
  }

  function buildWeekStrip() {
    const strip = document.getElementById('weekStrip'); strip.innerHTML = '';
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = d.toISOString().slice(0, 10);
      const hasDone = state.done[k]?.length > 0;
      strip.innerHTML += `<div class="day-dot"><span class="day-label">${days[d.getDay()]}</span><span class="day-circle ${hasDone?'done':''}">${hasDone?'✓':d.getDate()}</span></div>`;
    }
  }

  function updateXP() {
    const level = Math.floor(state.totalXP / 6) + 1;
    const xpInLevel = state.totalXP % 6;
    document.getElementById('levelNum').textContent = level;
    document.getElementById('xpText').textContent = `${xpInLevel} / 6 XP`;
    document.getElementById('xpBar').style.width = (xpInLevel / 6 * 100) + '%';
    document.getElementById('petEmoji').textContent = PETS_ALL[state.petIndex];
  }

  function buildHabits() {
    const grid = document.getElementById('habitGrid'); grid.innerHTML = '';
    state.userHabits.forEach(h => {
      const isDone = state.done[today].includes(h.id);
      const count = state.counts[today]?.[h.id] || 0;
      grid.innerHTML += `
        <div class="habit-card ${isDone?'done':''}" data-color="${h.color}" onclick="toggleHabit('${h.id}', this)">
          <div class="habit-emoji">${h.emoji}</div>
          <div class="habit-label">${h.label}</div>
          <div class="habit-streak">× ${count}</div>
          <div class="check-ring" style="background:${isDone?'currentColor':'transparent'}; color:${isDone?'white':'#DDD'};">
            ${isDone?'✓':''}
          </div>
        </div>`;
    });
  }

  function toggleHabit(id, card) {
    se_sound.currentTime = 0; se_sound.play().catch(e=>{});
    const rect = card.getBoundingClientRect();
    const heart = document.createElement('div'); heart.className = 'heart-float'; heart.textContent = '💖';
    heart.style.left = (rect.left + rect.width/2 - 10) + 'px'; heart.style.top = rect.top + 'px';
    document.body.appendChild(heart); setTimeout(()=>heart.remove(), 1200);

    if (!state.counts[today]) state.counts[today] = {};
    state.counts[today][id] = (state.counts[today][id] || 0) + 1;
    if (!state.done[today].includes(id)) state.done[today].push(id);
    state.totalXP++;
    save(); updateStats(); updateXP(); buildWeekStrip(); buildHabits();
    showToast('✨ +1 XP');
    checkWeeklyBonus();
  }

  function checkWeeklyBonus() {
    let streakCount = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = d.toISOString().slice(0, 10);
      if (state.done[k]?.length > 0) streakCount++; else break;
    }
    if (streakCount >= 7 && state.lastCongratsDate !== today) {
      showCongrats();
      state.lastCongratsDate = today; save();
    }
  }

  function showCongrats() {
    congrats_sound.currentTime = 0; congrats_sound.play().catch(e=>{});
    document.getElementById('congratsMessage').innerText = "🎊 7日連続達成！ 🎊\nあなたの継続力、本当に尊敬しちゃう！";
    document.getElementById('congratsOverlay').style.display = 'flex';
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  }

  function buildRecord() {
    const el = document.getElementById('recordList');
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    let html = `<div style="background:var(--card); border-radius:20px; padding:20px; backdrop-filter:blur(10px);">`;
    state.userHabits.forEach(h => {
      let count = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const k = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (state.done[k]?.includes(h.id)) count++;
      }
      // バーの長さを計算
      const percent = (count / daysInMonth) * 100;
      html += `
        <div style="margin-bottom:20px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:12px; font-weight:800;">
            <span>${h.emoji} ${h.label}</span><span>${count}/${daysInMonth}日</span>
          </div>
          <div style="width:100%; height:14px; background:rgba(0,0,0,0.05); border-radius:99px; position:relative;">
            <div style="width:${percent}%; height:100%; background:linear-gradient(90deg, #FF8B6B, #FFD166); border-radius:99px; position:relative; min-width:14px;">
              <span style="position:absolute; right:-10px; top:-5px; font-size:16px;">💖</span>
            </div>
          </div>
        </div>`;
    });
    el.innerHTML = html + `</div>`;
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['home','record','pet','settings'].forEach(p => document.getElementById('page-'+p).style.display = p === tab ? '' : 'none');
    if (tab === 'record') buildRecord();
    if (tab === 'pet') buildPetSelect();
    if (tab === 'settings') buildHabitEditList();
  }

  function addHabit() {
    const e = document.getElementById('newHabitEmoji');
    const l = document.getElementById('newHabitLabel');
    if (!l.value) return;
    state.userHabits.push({ id: 'h_'+Date.now(), emoji: e.value||'🐾', label: l.value, color: 'orange' });
    save(); e.value=''; l.value=''; buildHabitEditList(); buildHabits();
  }

  function deleteHabit(id) {
    if(confirm('削除する？')) { state.userHabits = state.userHabits.filter(h=>h.id!==id); save(); buildHabitEditList(); buildHabits(); }
  }

  function buildHabitEditList() {
    const el = document.getElementById('habitEditList');
    el.innerHTML = state.userHabits.map(h => `
      <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #EEE;">
        <span>${h.emoji} ${h.label}</span>
        <button onclick="deleteHabit('${h.id}')" style="background:#FFEAEA; color:#FF6B6B; border:none; padding:4px 8px; border-radius:5px;">削除</button>
      </div>`).join('');
  }

  function buildPetSelect() {
    const el = document.getElementById('petSelect');
    el.innerHTML = PETS_ALL.map((p, i) => `<div onclick="choosePet(${i})" style="font-size:32px; padding:10px; background:${state.petIndex===i?'#FFE8D6':'transparent'}; border-radius:15px; text-align:center;">${p}</div>`).join('');
    document.getElementById('petNameInput').value = state.petName || 'みるく';
  }

  function choosePet(i) { state.petIndex = i; save(); buildPetSelect(); updateXP(); }
  function savePetName() { state.petName = document.getElementById('petNameInput').value; save(); document.getElementById('petName').textContent = state.petName; showToast('保存したよ！'); }
  function resetToday() { if(confirm('今日の分を消す？')){ state.done[today]=[]; state.counts[today]={}; save(); location.reload(); }}
  function resetAll() { if(confirm('全部消す？')){ localStorage.clear(); location.reload(); }}
  function showToast(m) { const t = document.getElementById('toast'); t.textContent=m; t.className='toast show'; setTimeout(()=>t.className='toast', 1800); }
  function closeCongrats() { document.getElementById('congratsOverlay').style.display = 'none'; }
  function tapPet() {
    const b = document.getElementById('petBubble'); b.style.transform = 'scale(1.2)'; setTimeout(()=>b.style.transform='scale(1)', 200);
    showToast('なでなで！');
  }

  function exportData() {
    document.getElementById('backupArea').style.display = 'block';
    document.getElementById('backupText').value = JSON.stringify(state);
    showToast('コピーして保存してね');
  }

  if (state.petName) document.getElementById('petName').textContent = state.petName;
  updateStats(); buildWeekStrip(); updateXP(); buildHabits();
</script>
</body>
</html>
